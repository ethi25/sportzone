<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportZone 🏆</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #f0f0f0; font-family: 'Inter', sans-serif; }

        /* NAVBAR */
        .navbar { background: #000 !important; border-bottom: 1px solid #222; padding: 16px 0; }
        .navbar-brand { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 2rem; 
            color: #fff !important; 
            letter-spacing: 3px; 
        }
        .navbar-brand span { color: #ff3d00; }
        .nav-link { 
            color: #aaa !important; 
            font-size: 0.8rem; 
            font-weight: 600; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            margin-left: 24px;
            transition: color 0.2s;
        }
        .nav-link:hover { color: #fff !important; }

        /* BUTTONS */
        .btn-primary { 
            background: #ff3d00; 
            border: none; 
            font-weight: 700; 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
            padding: 12px 28px;
            border-radius: 2px;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #e63600; transform: translateY(-1px); }
        .btn-outline-secondary {
            border: 1px solid #444;
            color: #aaa;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 2px;
        }
        .btn-outline-secondary:hover { border-color: #fff; color: #fff; background: transparent; }

        /* CARDS */
        .card { 
            background: #111; 
            border: 1px solid #1e1e1e; 
            border-radius: 4px;
            transition: all 0.3s;
        }
        .card:hover { 
            border-color: #ff3d00; 
            transform: translateY(-6px); 
            box-shadow: 0 12px 30px rgba(255,61,0,0.15); 
        }
        .card-body { padding: 20px; }

        /* CATEGORY BADGE */
        .category-badge { 
            background: #ff3d00; 
            color: #fff; 
            padding: 3px 10px; 
            border-radius: 2px; 
            font-size: 0.7rem; 
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* PRICE */
        .price { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 1.4rem; 
            color: #ff3d00; 
            letter-spacing: 1px;
        }

        /* PRODUCT NAME */
        .product-name { 
            font-weight: 700; 
            font-size: 0.95rem; 
            letter-spacing: 0.5px; 
            color: #f0f0f0;
            text-transform: uppercase;
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a00 50%, #0a0a0a 100%);
            border: 1px solid #1e1e1e;
            border-radius: 4px;
            padding: 80px 60px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,61,0,0.15) 0%, transparent 70%);
        }
        .hero h1 { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 5rem; 
            letter-spacing: 5px; 
            line-height: 1;
            color: #fff;
        }
        .hero h1 span { color: #ff3d00; }
        .hero p { 
            font-size: 0.9rem; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: #888;
            margin-top: 12px;
        }

        /* SECTION TITLE */
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            border-left: 4px solid #ff3d00;
            padding-left: 16px;
            margin-bottom: 28px;
        }

        /* TABLE */
        .table { color: #f0f0f0; }
        .table-dark { background: #111; }
        .table td, .table th { border-color: #222; }

        /* FORM */
        .form-control { 
            background: #111; 
            border: 1px solid #333; 
            color: #f0f0f0; 
            border-radius: 2px;
        }
        .form-control:focus { 
            background: #1a1a1a; 
            border-color: #ff3d00; 
            color: #fff;
            box-shadow: 0 0 0 2px rgba(255,61,0,0.2);
        }
        .form-label { 
            font-size: 0.75rem; 
            font-weight: 700; 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
            color: #888;
        }

        /* FOOTER */
        footer { 
            background: #000; 
            border-top: 1px solid #1e1e1e; 
            color: #555; 
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* NO IMAGE BOX */
        .no-image {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 220px;
            color: #333;
            font-size: 2rem;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #ff3d00; border-radius: 3px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">SPORT<span>ZONE</span></a>
            <div class="navbar-nav ms-auto d-flex flex-row">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/cart/">Cart 🛒</a>
                {% if user.is_authenticated %}
                    <a class="nav-link" href="/checkout/orders/">Orders</a>
                    <a class="nav-link" href="/accounts/logout/">Logout</a>
                {% else %}
                    <a class="nav-link" href="/accounts/login/">Login</a>
                    <a class="nav-link" href="/accounts/register/">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="mt-5 py-4 text-center">
        <p class="mb-0">© 2024 SPORTZONE — JUST PLAY IT 🏆</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
